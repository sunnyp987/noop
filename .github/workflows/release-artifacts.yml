name: Release artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v. Defaults to project.yml MARKETING_VERSION."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apple:
    name: Build Apple artifacts
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          set -euo pipefail
          input_version="${{ github.event.inputs.version }}"
          if [ -n "$input_version" ]; then
            version="$input_version"
          elif [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/.*MARKETING_VERSION:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' project.yml | head -n 1)"
            test -n "$version"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "Building Apple artifacts for v$version"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install watchOS platform
        run: sudo xcodebuild -downloadPlatform watchOS

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build macOS app
        run: |
          set -euo pipefail
          rm -rf build/release-dd
          xcodebuild -scheme Strand -configuration Release \
            -derivedDataPath build/release-dd \
            -destination 'generic/platform=macOS' \
            ARCHS="x86_64 arm64" ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO build
          app="build/release-dd/Build/Products/Release/NOOP.app"
          test -d "$app"
          lipo -info "$app/Contents/MacOS/NOOP"
          lipo -info "$app/Contents/MacOS/NOOP" | grep -E 'x86_64.*arm64|arm64.*x86_64'
          Tools/anonymize-macos-app.sh "$app"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$app" "dist/NOOP-v${VERSION}-macos.zip"

      - name: Build unsigned iOS IPA
        run: |
          set -euo pipefail
          rm -rf build/ios-dd build/ios-stage
          xcodebuild -scheme NOOPiOS -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios-dd \
            CODE_SIGNING_ALLOWED=NO build
          app="build/ios-dd/Build/Products/Release-iphoneos/NOOP.app"
          test -d "$app"
          Tools/anonymize-ios-app.sh "$app"
          stage="build/ios-stage"
          mkdir -p "$stage/Payload"
          cp -R "$app" "$stage/Payload/"
          rm -rf "$stage/Payload/NOOP.app/Watch"
          (cd "$stage" && zip -qry "$GITHUB_WORKSPACE/dist/NOOP-v${VERSION}-ios.ipa" Payload)

      - name: Upload Apple artifacts
        uses: actions/upload-artifact@v4
        with:
          name: noop-apple-artifacts
          path: |
            dist/NOOP-v*-macos.zip
            dist/NOOP-v*-ios.ipa
          if-no-files-found: error

  android:
    name: Build Android artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          set -euo pipefail
          input_version="${{ github.event.inputs.version }}"
          if [ -n "$input_version" ]; then
            version="$input_version"
          elif [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/.*MARKETING_VERSION:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' project.yml | head -n 1)"
            test -n "$version"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "Building Android artifact for v$version"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build full release APK
        run: ./gradlew assembleFullRelease
        working-directory: android

      - name: Collect Android artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp android/app/build/outputs/apk/full/release/app-full-release.apk "dist/NOOP-v${VERSION}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: noop-android-artifact
          path: dist/NOOP-v*.apk
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - apple
      - android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          set -euo pipefail
          input_version="${{ github.event.inputs.version }}"
          if [ -n "$input_version" ]; then
            version="$input_version"
          elif [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/.*MARKETING_VERSION:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' project.yml | head -n 1)"
            test -n "$version"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "TAG=v$version" >> "$GITHUB_ENV"

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: noop-*
          path: dist
          merge-multiple: true

      - name: Publish or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ls -lh dist
          notes="Recovered NOOP ${TAG} artifacts from this continuity mirror."
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "NOOP ${TAG}" --notes "$notes" --latest
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" --title "NOOP ${TAG}" --notes "$notes" --latest
          fi
